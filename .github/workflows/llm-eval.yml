## llm-eval.yml
##
## Label-gated LLM evaluation workflow for PRs.
## See testing/llm_eval/ for the harness. Design rationale in the runbook.

name: LLM Eval (PR regression)

on:
  pull_request_target:
    types: [labeled, synchronize]
    paths:
      - "awslabs/**"
      - "testing/llm_eval/**"

permissions:
  contents: read

concurrency:
  group: llm-eval-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: Verify label + actor permissions
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'run-llm-eval') ||
      (github.event.action == 'synchronize' &&
       contains(github.event.pull_request.labels.*.name, 'run-llm-eval'))
    outputs:
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
    steps:
      - name: Check actor has write permission
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner, repo: context.repo.repo, username: actor,
            });
            const allowed = ['admin', 'maintain', 'write'];
            if (!allowed.includes(perm.permission)) {
              core.setFailed(`Actor ${actor} has permission "${perm.permission}" which is not sufficient.`);
            }
      - name: Resolve PR head SHA
        id: resolve
        run: echo "pr_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

  eval:
    name: Run MCP eval
    needs: gate
    runs-on: ubuntu-latest
    environment: llm-eval
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout base branch (trusted harness code)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout PR code (untrusted; install as package)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.pr_sha }}
          path: pr-source
          persist-credentials: false

      - name: Install PR's MCP server + harness deps
        run: |
          python -m pip install --upgrade pip
          # Install the PR's MCP server code as an editable package so the
          # harness can import its modules. The install itself does not run
          # any PR code beyond pyproject metadata.
          pip install ./pr-source
          # Harness dependencies — pinned so a PR to our own deps file can't
          # slip a new package into the eval runtime.
          pip install \
            'strands-agents==1.37.0' \
            'boto3==1.42.96'

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.LLM_EVAL_ROLE_ARN }}
          role-session-name: llm-eval-pr-${{ github.event.pull_request.number }}
          aws-region: us-east-1

      - name: Run eval harness
        env:
          PYTHONUNBUFFERED: "1"
          BEDROCK_MODEL_ID: us.anthropic.claude-opus-4-5-20251101-v1:0
          AWS_REGION: us-east-1
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SOURCE_DIR: ${{ github.workspace }}/pr-source
          EVAL_RESULT_PATH: ${{ github.workspace }}/eval-result.json
        # Keep going even if the harness exits non-zero (assertion failure);
        # we still want to upload the result artifact so post-comment can
        # report the failure on the PR.
        continue-on-error: true
        run: |
          python testing/llm_eval/run_eval.py
          echo "--- Post-run file listing ---"
          ls -la "${EVAL_RESULT_PATH}" || echo "RESULT FILE MISSING"

      - name: Upload eval result artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-result
          path: ${{ github.workspace }}/eval-result.json
          if-no-files-found: error
          retention-days: 7

  post-comment:
    name: Post result comment on PR
    needs: eval
    if: always() && needs.eval.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout base branch (for post_comment.py)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: eval-result
          path: artifact
      - name: Post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVAL_RESULT_PATH: ${{ github.workspace }}/artifact/eval-result.json
        run: python testing/llm_eval/post_comment.py

  remove-label:
    name: Remove run-llm-eval label
    needs: eval
    if: always() && needs.eval.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'run-llm-eval',
              });
            } catch (e) { if (e.status !== 404) throw e; }
