## llm-eval.yml
##
## Label-gated LLM evaluation workflow for PRs.
## See testing/llm_eval/ for the harness and the setup runbook for design rationale.

name: LLM Eval (PR regression)

on:
  pull_request_target:
    types: [labeled, synchronize]
    paths:
      - "awslabs/**"
      - "testing/llm_eval/**"

permissions:
  contents: read

concurrency:
  group: llm-eval-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: Verify label + actor permissions
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'run-llm-eval') ||
      (github.event.action == 'synchronize' &&
       contains(github.event.pull_request.labels.*.name, 'run-llm-eval'))
    outputs:
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
    steps:
      - name: Check actor has write permission
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner, repo: context.repo.repo, username: actor,
            });
            const allowed = ['admin', 'maintain', 'write'];
            if (!allowed.includes(perm.permission)) {
              core.setFailed(`Actor ${actor} has permission "${perm.permission}" which is not sufficient.`);
            }
      - name: Resolve PR head SHA
        id: resolve
        run: echo "pr_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

  eval:
    name: Run MCP eval suite
    needs: gate
    runs-on: ubuntu-latest
    environment: llm-eval
    timeout-minutes: 25
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout base branch (trusted harness code)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout PR code (untrusted; install as package)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.pr_sha }}
          path: pr-source
          persist-credentials: false

      - name: Install PR's MCP server + harness deps
        run: |
          python -m pip install --upgrade pip
          pip install ./pr-source
          pip install \
            'strands-agents==1.37.0' \
            'boto3==1.42.96'

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.LLM_EVAL_ROLE_ARN }}
          role-session-name: llm-eval-pr-${{ github.event.pull_request.number }}
          aws-region: us-east-1

      # The harness exits non-zero when thresholds are missed. That fails the
      # eval job which blocks the check - use branch protection to require it.
      - name: Run eval suite
        env:
          PYTHONUNBUFFERED: "1"
          BEDROCK_MODEL_ID: us.anthropic.claude-opus-4-5-20251101-v1:0
          AWS_REGION: us-east-1
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVAL_RESULT_PATH: ${{ github.workspace }}/eval-result.json
          EVAL_REPORT_PATH: ${{ github.workspace }}/eval-report.html
          EVAL_THRESHOLD: "90"
        # Keep going on failure so we still upload the report and post the
        # comment. We re-assert the eval outcome after the post-comment job
        # in a dedicated "enforce" job.
        continue-on-error: true
        id: eval
        run: |
          python testing/llm_eval/run_eval.py

      - name: Upload eval JSON result
        uses: actions/upload-artifact@v4
        with:
          name: eval-result
          path: ${{ github.workspace }}/eval-result.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload eval HTML report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: ${{ github.workspace }}/eval-report.html
          if-no-files-found: error
          retention-days: 14

      # Record the harness exit code so the enforce job can act on it.
      - name: Record eval outcome
        run: |
          echo "harness_outcome=${{ steps.eval.outcome }}" >> "$GITHUB_OUTPUT"
        id: outcome

    outputs:
      harness_outcome: ${{ steps.eval.outcome }}

  post-comment:
    name: Post result comment on PR
    needs: eval
    if: always() && needs.eval.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: eval-result
          path: artifact
      - name: Post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVAL_RESULT_PATH: ${{ github.workspace }}/artifact/eval-result.json
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python testing/llm_eval/post_comment.py

  enforce:
    name: Enforce eval threshold
    needs: [eval, post-comment]
    # Run even when post-comment fails so the job still blocks the check.
    if: always() && needs.eval.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Fail if harness exited non-zero
        run: |
          outcome="${{ needs.eval.outputs.harness_outcome }}"
          echo "Harness outcome: ${outcome}"
          if [ "${outcome}" != "success" ]; then
            echo "::error::LLM eval thresholds not met. See the PR comment and the eval-report artifact."
            exit 1
          fi

  remove-label:
    name: Remove run-llm-eval label
    needs: eval
    if: always() && needs.eval.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'run-llm-eval',
              });
            } catch (e) { if (e.status !== 404) throw e; }
